services:
  - type: web
    name: quadrinhos-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quadrinhos-db
          property: connectionString

databases:
  - name: quadrinhos-db
    databaseName: quadrinhos
    plan: free
