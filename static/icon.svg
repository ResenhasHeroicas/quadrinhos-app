<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo roxo arredondado -->
  <rect width="512" height="512" rx="112" fill="#4338ca"/>

  <!-- Livro de baixo (laranja/salmão) - levemente rotacionado para direita -->
  <g transform="rotate(6, 256, 256)">
    <rect x="116" y="290" width="290" height="68" rx="10" fill="#FFAB76"/>
  </g>

  <!-- Livro do meio (rosa) - levemente rotacionado para esquerda -->
  <g transform="rotate(-4, 256, 256)">
    <rect x="116" y="210" width="290" height="68" rx="10" fill="#F472B6"/>
  </g>

  <!-- Livro de cima (verde menta) - levemente rotacionado para direita -->
  <g transform="rotate(3, 256, 256)">
    <rect x="116" y="130" width="290" height="68" rx="10" fill="#6EE7B7"/>
  </g>
</svg>
